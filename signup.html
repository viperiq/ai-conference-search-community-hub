<!DOCTYPE html>
<html>
<head>
    <title>Create Account | ConfHub</title>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js" defer></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden p-10">
        <form action="process-signup.php" method="post" id="signup" enctype="multipart/form-data" class="space-y-6">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Join ConfHub</h1>
                <p class="text-slate-500 text-sm mt-2">Start your academic journey with us</p>
            </div>

            <div class="flex justify-center mb-6">
                <div class="relative group">
                    <input type="file" name="profile_image" id="profile_image" accept="image/*" class="hidden" onchange="displayImage(this)">
                    <label for="profile_image" class="cursor-pointer block">
                        <div class="w-24 h-24 rounded-full border-4 border-slate-50 shadow-md overflow-hidden bg-slate-100">
                            <img id="previewImage" src="images/user.png" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute bottom-0 right-0 bg-indigo-600 text-white p-2 rounded-full shadow-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                    </label>
                </div>
            </div>
            
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label for="name" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Full Name</label>
                    <input type="text" id="name" name="name" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="John Doe">
                </div>
                
                <div>
                    <label for="email" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Email</label>
                    <input type="email" id="email" name="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="john@example.com">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="password" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Password</label>
                        <input type="password" id="password" name="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                    </div>
                    <div>
                        <label for="password_confirmation" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Confirm</label>
                        <input type="password" id="password_confirmation" name="password_confirmation" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                    </div>
                </div>
            </div>

            <button class="w-full py-4 bg-emerald-500 text-slate-900 font-bold rounded-xl hover:bg-emerald-400 shadow-lg shadow-emerald-500/20 transition transform hover:-translate-y-0.5 active:translate-y-0">
                Create My Account
            </button>

            <p class="text-center text-slate-600 text-sm">
                Already have an account? 
                <a href="login.php" class="text-indigo-600 font-bold hover:underline">Log in</a>
            </p>
        </form>
    </div>
    <script>
    function displayImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('previewImage').src = e.target.result;
            reader.readAsDataURL(file);
        }
    }
    </script>
</body>
</html>
